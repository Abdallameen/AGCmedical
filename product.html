<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="مؤسسة ركن الخليج العربي - تفاصيل المنتج">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>تفاصيل المنتج | AGC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            direction: rtl;
            background: #f0f2f5;
        }

        .main-header {
            background: linear-gradient(135deg, #0c5e9e 0%, #0a4a7a 100%);
            color: white;
            padding: 15px 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .back-link {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .product-detail-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .product-detail-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .product-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        .product-detail-image img {
            width: 100%;
            border-radius: 15px;
        }

        .product-detail-info h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #1a1a2e;
        }

        .product-detail-price {
            font-size: 24px;
            color: #0d6efd;
            font-weight: bold;
            margin: 20px 0;
        }

        .product-detail-supply {
            background: #e8f5e9;
            padding: 10px 15px;
            border-radius: 10px;
            margin: 15px 0;
            color: #2e7d32;
        }

        .section-title {
            font-size: 20px;
            margin: 20px 0 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0d6efd;
        }

        .additional-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .additional-info textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            margin-top: 10px;
            resize: vertical;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-whatsapp-large {
            flex: 1;
            background: #25d366;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .product-detail-grid {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }
        /* تنسيقات صفحة التفاصيل الجديدة */
.product-detail-price {
    font-size: 28px;
    color: #0d6efd;
    font-weight: bold;
    margin: 15px 0;
}

.product-detail-supply {
    background: #e8f5e9;
    padding: 10px 15px;
    border-radius: 10px;
    margin: 10px 0;
    color: #2e7d32;
}

.instant-badge-large {
    background: linear-gradient(135deg, #198754, #157347);
    padding: 8px 15px;
    border-radius: 25px;
    display: inline-block;
    margin: 10px 0;
    color: white;
    font-weight: bold;
}

.info-section {
    margin: 25px 0;
    padding: 15px;
    background: #f8f9fa;
    border-radius: 12px;
}

.info-section h3 {
    margin-bottom: 12px;
    color: #0d6efd;
    display: flex;
    align-items: center;
    gap: 8px;
}

.info-section h3 i {
    font-size: 20px;
}

.info-content {
    line-height: 1.8;
    color: #444;
}

.info-content ul, .info-content ol {
    padding-right: 20px;
    margin: 10px 0;
}

.info-content li {
    margin: 5px 0;
}

.action-buttons {
    margin-top: 30px;
}

.btn-whatsapp-large {
    width: 100%;
    background: #25d366;
    color: white;
    border: none;
    padding: 15px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: 0.3s;
}

.btn-whatsapp-large:hover {
    background: #1da851;
    transform: scale(1.02);
}

@media (max-width: 768px) {
    .product-detail-grid {
        grid-template-columns: 1fr;
        padding: 20px;
    }
}
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="back-link">← العودة إلى المتجر</a>
            <div>🏥 مؤسسة ركن الخليج العربي | AGC</div>
        </div>
    </header>

    <div class="product-detail-container" id="productDetail">
        <!-- سيتم تعبئة المحتوى بواسطة JavaScript -->
    </div>

    <script src="data.js"></script>
    <script src="product-details.js"></script>
</body>
</html>
